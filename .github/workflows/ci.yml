name: ci

on:
  push:
  pull_request:

jobs:
  host-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install API reference tools
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen
      - name: Check API reference
        run: python scripts/generate_api_reference.py --title "SLMP C++ API Reference" --output docsrc/user/API_REFERENCE.md --input src/slmp_minimal.h --input src/slmp_high_level.h --input src/slmp_arduino_transport.h --input src/slmp_error_codes.h --input src/slmp_utility.h --predefine SLMP_MINIMAL_ENABLE_HIGH_LEVEL=1 --predefine SLMP_ENABLE_UDP_TRANSPORT=1 --check
      - name: Build host tests
        run: g++ -std=c++17 -Wall -Wextra -Isrc tests/slmp_minimal_tests.cpp src/slmp_minimal.cpp src/slmp_error_codes.cpp src/slmp_high_level.cpp -o /tmp/slmp_minimal_tests
      - name: Run host tests
        run: /tmp/slmp_minimal_tests
      - name: Run socket integration test
        run: python scripts/run_socket_integration.py --compiler g++

  host-sanitizers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Build host tests with sanitizers
        run: g++ -std=c++17 -Wall -Wextra -O1 -g -fsanitize=address,undefined -fno-omit-frame-pointer -Isrc tests/slmp_minimal_tests.cpp src/slmp_minimal.cpp src/slmp_error_codes.cpp src/slmp_high_level.cpp -o /tmp/slmp_minimal_tests_san
      - name: Run sanitizer tests
        env:
          ASAN_OPTIONS: detect_leaks=1:strict_string_checks=1
          UBSAN_OPTIONS: print_stacktrace=1
        run: /tmp/slmp_minimal_tests_san

  host-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install gcovr
        run: pip install gcovr
      - name: Build host tests with coverage
        run: g++ -std=c++17 -Wall -Wextra --coverage -Isrc tests/slmp_minimal_tests.cpp src/slmp_minimal.cpp src/slmp_error_codes.cpp src/slmp_high_level.cpp -o /tmp/slmp_minimal_tests_cov
      - name: Run coverage tests
        run: /tmp/slmp_minimal_tests_cov
      - name: Generate coverage reports
        run: |
          gcovr --root . --filter src --txt-summary > coverage-summary.txt
          gcovr --root . --filter src --xml-pretty -o coverage.xml
          gcovr --root . --filter src --html-details coverage.html
      - name: Publish coverage summary
        run: cat coverage-summary.txt >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v7
        with:
          name: host-coverage
          path: |
            coverage-summary.txt
            coverage.xml
            coverage.html
          retention-days: 7

  trigger-docs-rebuild:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - host-tests
      - host-sanitizers
      - host-coverage
    runs-on: ubuntu-latest
    steps:
      - name: Trigger docs rebuild
        env:
          DOCS_REPO_TOKEN: ${{ secrets.DOCS_REPO_TOKEN }}
        run: |
          if [ -z "$DOCS_REPO_TOKEN" ]; then
            echo "::notice::DOCS_REPO_TOKEN is not configured; skipping docs rebuild dispatch."
            exit 0
          fi

          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $DOCS_REPO_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/fa-yoshinobu/plc-comm-docs-site/dispatches \
            -d '{"event_type":"source-updated","client_payload":{"repo":"${{ github.repository }}"}}'
