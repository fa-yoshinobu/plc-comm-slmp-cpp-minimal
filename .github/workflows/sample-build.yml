name: Sample build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  sample-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          python -m pip install platformio

      - name: Build high level snapshot example
        run: pio run -d examples/high_level_snapshot -e native
