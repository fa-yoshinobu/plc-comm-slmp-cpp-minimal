[platformio]
src_dir = ../..

[env:native]
platform = native
build_unflags =
    -std=gnu++11
    -std=gnu++14
build_flags =
    -std=c++17
    -I../../src
build_src_filter =
    -<*>
    +<src/slmp_minimal.cpp>
    +<src/slmp_error_codes.cpp>
    +<src/slmp_high_level.cpp>
    +<examples/high_level_snapshot/high_level_snapshot.cpp>
